spring:
  application:
    name: financial-erp
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

app:
  security:
    jwt:
      access-token-expiry-seconds: ${JWT_ACCESS_TOKEN_EXPIRY:900}
      refresh-token-expiry-seconds: ${JWT_REFRESH_TOKEN_EXPIRY:604800}
      issuer: ${JWT_ISSUER:https://financial-erp.com}
      token-type: ${TOKEN_TYPE:Bearer}